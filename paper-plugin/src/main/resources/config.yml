prefix: "&b&l[&9SafeCombat&b&l]"

database:
  name: "plugin_safecombat"

# PvP settings
pvp:
  durations:
    # Duration of a fight.
    # A player is only allowed to leave after this duration once a fight started.
    fight: 30s

    # First-connection duration protection.
    newbie-protection: 48h
    # Respawn duration protection.
    respawn-protection: 30s
    # Server join duration. This one is transient.
    server-join-protection: 5s

    # Time, in seconds, to be considered to have leaved the fight after a disconnection.
    # If the player did not reconnect until then, he will be punished.
    allowed-disconnection: 10s

  # Cooldown a trident material to the player if it has a riptide enchant
  trident-cooldown:
    enabled: true
    duration: 15s

  enderpearl:
    # If an enderpearl allows the player to bypass the force-field when thrown, even if the player is in pvp.
    bypass-force-field: false
    # Set a custom cooldown to enderpearl when thrown
    custom-cooldown: true
    cooldown-time: 10s

  # Forbid player in PvP from going back to a safe-zone
  force-field:
    enabled: false
    # Higher are the values, greater is the risk of lag
    radius: 8
    height: 5
    material: "RED_STAINED_GLASS"

# Banned commands if the player is in pvp
banned-commands:
  - "tpyes"
  - "etpyes"
  - "tpaccept"
  - "etpaccept"
  - "sethome"
  - "esethome"
  - "createhome"
  - "ecreatehome"
  - "home"
  - "ehome"
  - "spawn"
  - "espawn"
  - "f home"
  - "tp"
  - "islet"
