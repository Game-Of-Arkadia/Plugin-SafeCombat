prefix: "&b&l[&9SafeCombat&b&l]"

database:
  name: "plugin_safecombat"

# PvP settings
pvp:
  durations:
    # Duration of a fight.
    # A player is only allowed to leave after this duration once a fight started.
    fight: 30s

    # First-connection duration protection.
    newbie-protection: 48h
    # Respawn duration protection.
    respawn-protection: 20s
    # Server join duration. This one is transient.
    server-join-protection: 5s

    # Time, in seconds, to be considered to have leaved the fight after a disconnection.
    # If the player did not reconnect until then, he will be punished.
    allowed-disconnection: 1m

punishment:
  lose-money: true
  ban:
    enabled: true
    reason: "Déconnecté en combat."
    duration: 1d
    main-server: arkadia

# Banned commands if the player is in pvp
banned-commands:
  - "tpyes"
  - "etpyes"
  - "tpaccept"
  - "etpaccept"
  - "sethome"
  - "esethome"
  - "createhome"
  - "ecreatehome"
  - "home"
  - "ehome"
  - "spawn"
  - "espawn"
  - "f home"
  - "tp"
  - "islet"
